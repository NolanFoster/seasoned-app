name = "recipe-recommendation-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Enable observability features
[observability]
enabled = true

# AI binding for Cloudflare Workers AI
[ai]
binding = "AI"

# Analytics Engine binding for metrics collection
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "recipe_recommendations_metrics"

# Service binding to recipe search worker
[[services]]
binding = "SEARCH_WORKER"
service = "recipe-search-db"

# Service binding to recipe save worker
[[services]]
binding = "RECIPE_SAVE_WORKER"
service = "recipe-save-worker"

[env.production.ai]
binding = "AI"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "recipe_recommendations_metrics_prod"

[[env.production.services]]
binding = "SEARCH_WORKER"
service = "recipe-search-db"

[[env.production.services]]
binding = "RECIPE_SAVE_WORKER"
service = "recipe-save-worker"

[env.preview]
name = "preview-recipe-recommendation-worker"

[env.preview.ai]
binding = "AI"

[[env.preview.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "recipe_recommendations_metrics_preview"

[[env.preview.services]]
binding = "SEARCH_WORKER"
service = "recipe-search-db"

[[env.preview.services]]
binding = "RECIPE_SAVE_WORKER"
service = "recipe-save-worker"

# Staging environment
[env.staging]
name = "staging-recipe-recommendation-worker"

[env.staging.ai]
binding = "AI"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "recipe_recommendations_metrics_staging"

[[env.staging.services]]
binding = "SEARCH_WORKER"
service = "staging-recipe-search-db"

[[env.staging.services]]
binding = "RECIPE_SAVE_WORKER"
service = "recipe-save-worker"