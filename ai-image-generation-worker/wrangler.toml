# AI Image Generation Worker Configuration
name = "ai-image-generation-worker"
main = "src/index.js"

compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Default configuration
[vars]
ENVIRONMENT = "development"
IMAGE_DOMAIN = "https://images.nolanfoster.me"

[observability]
enabled = true

# AI binding for FLUX model
[ai]
binding = "AI"

# R2 Bucket for storing generated images
[[r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "recipe-images"

# Preview environment (for PR previews)
[env.preview]
name = "ai-image-generation-worker-preview"
[env.preview.vars]
ENVIRONMENT = "preview"
IMAGE_DOMAIN = "https://preview-images.nolanfoster.me"

[env.preview.observability]
enabled = true

[env.preview.ai]
binding = "AI"

[[env.preview.r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "recipe-images"

# Staging environment
[env.staging]
name = "ai-image-generation-worker-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
IMAGE_DOMAIN = "https://images.nolanfoster.me"

[env.staging.observability]
enabled = true

[env.staging.ai]
binding = "AI"

[[env.staging.r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "recipe-images"

# Production environment
[env.production]
name = "ai-image-generation-worker"
[env.production.vars]
ENVIRONMENT = "production"
IMAGE_DOMAIN = "https://images.nolanfoster.me"

[env.production.observability]
enabled = true

[env.production.ai]
binding = "AI"

[[env.production.r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "recipe-images"

# Development environment
[env.development]
name = "ai-image-generation-worker"
[env.development.vars]
ENVIRONMENT = "development"
IMAGE_DOMAIN = "https://images.nolanfoster.me"

[env.development.observability]
enabled = true

[env.development.ai]
binding = "AI"

[[env.development.r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "recipe-images"