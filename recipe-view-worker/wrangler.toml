name = "recipe-view-worker"
main = "src/index.js"
compatibility_date = "2024-01-10"

# Production environment variables
[vars]
RECIPE_SAVE_WORKER_URL = "https://recipe-save-worker.nolanfoster.workers.dev"

# Service binding to recipe-save-worker (avoids workers.dev subrequest restriction)
[[services]]
binding = "RECIPE_SAVE_WORKER"
service = "recipe-save-worker"

# Development settings
[env.preview]
name = "preview-recipe-view-worker"
[env.preview.vars]
RECIPE_SAVE_WORKER_URL = "https://preview-recipe-save-worker.nolanfoster.workers.dev"

# Staging settings
[env.staging]
name = "staging-recipe-view-worker"
[env.staging.vars]
RECIPE_SAVE_WORKER_URL = "https://staging-recipe-save-worker.nolanfoster.workers.dev"

[[env.staging.services]]
binding = "RECIPE_SAVE_WORKER"
service = "staging-recipe-save-worker"

[observability]
enabled = true
